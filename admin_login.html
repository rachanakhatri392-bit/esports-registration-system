<!DOCTYPE html>
<html>
<head>
    <title>UK E-Sports League | Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            height: 100vh;
        }
        .login-card{
            max-width: 420px;
            margin: auto;
            margin-top: 120px;
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="card login-card shadow-lg p-4">
    <h3 class="text-center text-primary mb-3">Admin Login</h3>
    <p class="text-center text-muted">UK E-Sports League Control Panel</p>

    <form action="login.php" method="POST">
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <button class="btn btn-primary w-100">Login</button>
    </form>

    <div class="text-center mt-3">
        <a href="index.html" class="text-decoration-none">← Back to Home</a>
    </div>
</div>

</html>
